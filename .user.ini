; Azre International — PHP config for shared hosting
; Enables verbose error display + logging to debug 500s.
; Set log_errors=1 and error_log to a file we can tail.

display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /home/u737768883/public_html/php-errors.log

; Sensible defaults for an e-commerce site
upload_max_filesize = 8M
post_max_size = 12M
max_execution_time = 30
memory_limit = 256M
session.cookie_httponly = 1
session.use_strict_mode = 1
