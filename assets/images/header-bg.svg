<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2540"/>
      <stop offset="0.4" stop-color="#2c3e6a"/>
      <stop offset="0.7" stop-color="#3a2c5a"/>
      <stop offset="1" stop-color="#1a2540"/>
    </linearGradient>
    <linearGradient id="hsh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="0.5" stop-color="rgba(255,255,255,0)"/>
      <stop offset="1" stop-color="rgba(0,0,0,0.20)"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(255,179,71,0)"/>
      <stop offset="0.5" stop-color="rgba(255,179,71,0.30)"/>
      <stop offset="1" stop-color="rgba(255,179,71,0)"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(43,77,255,0)"/>
      <stop offset="0.5" stop-color="rgba(43,77,255,0.28)"/>
      <stop offset="1" stop-color="rgba(43,77,255,0)"/>
    </linearGradient>
    <pattern id="dotgrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.2" fill="rgba(255,255,255,0.10)"/>
    </pattern>
  </defs>

  <!-- Base gradient -->
  <rect width="1200" height="100" fill="url(#hbg)"/>

  <!-- Dot grid pattern overlay (more visible) -->
  <rect width="1200" height="100" fill="url(#dotgrid)"/>

  <!-- Big soft glow circles for depth -->
  <circle cx="200" cy="50" r="180" fill="rgba(43,77,255,0.22)" />
  <circle cx="1000" cy="60" r="220" fill="rgba(255,140,26,0.18)" />
  <circle cx="600" cy="20" r="120" fill="rgba(180,120,255,0.12)" />

  <!-- Diagonal stripes (subtle but visible) -->
  <g opacity="0.18">
    <path d="M -100 100 L 1100 -50" stroke="rgba(255,255,255,0.18)" stroke-width="1" fill="none"/>
    <path d="M -100 80 L 1100 -70" stroke="rgba(255,255,255,0.10)" stroke-width="1" fill="none"/>
    <path d="M -100 60 L 1100 -90" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="none"/>
  </g>

  <!-- Top wave accent (amber) -->
  <path d="M 0 12 Q 300 0 600 12 T 1200 8" stroke="url(#wave1)" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- Bottom wave accent (blue) -->
  <path d="M 0 88 Q 300 76 600 88 T 1200 84" stroke="url(#wave2)" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- Highlight/shadow overlay -->
  <rect width="1200" height="100" fill="url(#hsh)"/>

  <!-- Bottom amber accent line -->
  <line x1="0" y1="99" x2="1200" y2="99" stroke="rgba(255,179,71,0.55)" stroke-width="1.5"/>
</svg>
