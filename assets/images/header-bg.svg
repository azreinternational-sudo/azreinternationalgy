      <stop offset="0" stop-color="rgba(43,77,255,0.20)"/>
      <stop offset="1" stop-color="rgba(43,77,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="80" fill="url(#hbg)"/>
  <rect width="1200" height="80" fill="url(#hstripes)"/>
  <rect width="1200" height="80" fill="url(#hglow)"/>
  <rect width="1200" height="80" fill="url(#hglow2)"/>
  <rect width="1200" height="80" fill="url(#hhi)"/>
  <line x1="0" y1="79" x2="1200" y2="79" stroke="rgba(255,179,71,0.35)" stroke-width="1"/>
