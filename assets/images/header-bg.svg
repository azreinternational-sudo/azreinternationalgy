<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0" stop-color="#1a2540"/>
      <stop offset="0.5" stop-color="#2b3d63"/>
      <stop offset="1" stop-color="#1a2540"/>
    </linearGradient>
    <linearGradient id="hhi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="1" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <pattern id="hstripes" width="56" height="56" patternUnits="userSpaceOnUse" patternTransform="rotate(-18)">
      <line x1="0" y1="0" x2="0" y2="56" stroke="rgba(255,255,255,0.045)" stroke-width="28"/>
    </pattern>
    <radialGradient id="hglow" cx="0.85" cy="0.5" r="0.7">
      <stop offset="0" stop-color="rgba(255,179,71,0.18)"/>
      <stop offset="1" stop-color="rgba(255,179,71,0)"/>
    </radialGradient>
