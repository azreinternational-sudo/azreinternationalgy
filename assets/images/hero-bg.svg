<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="hbase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1a36"/>
      <stop offset="0.5" stop-color="#1a2540"/>
      <stop offset="1" stop-color="#0a1024"/>
    </linearGradient>
    <radialGradient id="horb" cx="0.78" cy="0.35" r="0.55">
      <stop offset="0" stop-color="rgba(255,140,26,0.55)"/>
      <stop offset="1" stop-color="rgba(255,140,26,0)"/>
    </radialGradient>
    <radialGradient id="hblu" cx="0.18" cy="0.85" r="0.6">
      <stop offset="0" stop-color="rgba(43,77,255,0.55)"/>
      <stop offset="1" stop-color="rgba(43,77,255,0)"/>
    </radialGradient>
    <linearGradient id="hdiag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0)"/>
      <stop offset="0.5" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <pattern id="hgrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Base -->
  <rect width="1600" height="900" fill="url(#hbase)"/>

  <!-- Subtle grid -->
  <rect width="1600" height="900" fill="url(#hgrid)"/>

  <!-- Big soft glows (warm + cool) -->
  <rect width="1600" height="900" fill="url(#horb)"/>
  <rect width="1600" height="900" fill="url(#hblu)"/>

  <!-- Stylized diagonal "motion" lines (truck/auto feel) -->
  <g opacity="0.45">
    <line x1="-200" y1="700" x2="1800" y2="100" stroke="rgba(255,179,71,0.18)" stroke-width="2"/>
    <line x1="-200" y1="740" x2="1800" y2="140" stroke="rgba(255,179,71,0.12)" stroke-width="2"/>
    <line x1="-200" y1="780" x2="1800" y2="180" stroke="rgba(255,179,71,0.08)" stroke-width="2"/>
    <line x1="-200" y1="820" x2="1800" y2="220" stroke="rgba(255,179,71,0.05)" stroke-width="2"/>
  </g>

  <!-- Right-side abstract mechanical shapes (gear hint) -->
  <g opacity="0.18" transform="translate(1180 200)">
    <circle cx="0" cy="0" r="180" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="rgba(255,179,71,0.6)" stroke-width="2"/>
    <!-- gear teeth -->
    <g stroke="rgba(255,255,255,0.4)" stroke-width="3" fill="none">
      <line x1="0" y1="-200" x2="0" y2="-150"/>
      <line x1="0" y1="150" x2="0" y2="200"/>
      <line x1="-200" y1="0" x2="-150" y2="0"/>
      <line x1="150" y1="0" x2="200" y2="0"/>
      <line x1="-141" y1="-141" x2="-106" y2="-106"/>
      <line x1="106" y1="106" x2="141" y2="141"/>
      <line x1="-141" y1="141" x2="-106" y2="106"/>
      <line x1="106" y1="-106" x2="141" y2="-141"/>
    </g>
  </g>

  <!-- Left-side stylized "wave / hose" curve (marine / fluid hint) -->
  <g opacity="0.30" fill="none" stroke="rgba(43,77,255,0.5)" stroke-width="3">
    <path d="M -50 480 C 200 380, 400 580, 650 460 S 1100 340, 1300 460"/>
    <path d="M -50 540 C 200 440, 400 640, 650 520 S 1100 400, 1300 520" stroke-opacity="0.7"/>
    <path d="M -50 600 C 200 500, 400 700, 650 580 S 1100 460, 1300 580" stroke-opacity="0.4"/>
  </g>

  <!-- Top amber accent line -->
  <line x1="0" y1="2" x2="1600" y2="2" stroke="rgba(255,179,71,0.4)" stroke-width="2"/>

  <!-- Diagonal sweep overlay -->
  <rect width="1600" height="900" fill="url(#hdiag)"/>
</svg>
